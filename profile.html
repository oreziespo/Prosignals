<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSignals - My Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #F4F4F4; color: #1a1a1a; }

        /* ── NAVBAR ── */
        .navbar { 
            width: 100%; background: #6DFFD4; height: 70px; display: flex;
            align-items: center; position: fixed; top: 0; left: 0; z-index: 1000; padding: 0 1.5rem;
        }
        .navbar .logo { font-size: 1.4rem; font-weight: 800; color: #000; text-decoration: none; }
        .navbar .logo span { color: #00A3FF; }
        .menu-toggle { margin-left: auto; font-size: 1.5rem; cursor: pointer; }

        /* ── MOBILE MENU ── */
        .side-menu { position: fixed; top: 0; right: -100%; height: 100vh; width: 280px; background: white; z-index: 2000; transition: 0.4s ease; padding: 2rem; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .side-menu.active { right: 0; }
        .close-menu { align-self: flex-end; font-size: 1.8rem; cursor: pointer; margin-bottom: 2rem; }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 1.5rem; }
        .nav-links a { text-decoration: none; color: #1a1a1a; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .nav-links a i { color: #8A2BE2; width: 25px; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1500; display: none; }
        .menu-overlay.active { display: block; }

        /* ── PAGE CONTENT ── */
        .page-content { padding-top: 100px; padding-left: 1rem; padding-right: 1rem; max-width: 500px; margin: 0 auto; }
        
        .profile-header { text-align: center; margin-bottom: 2rem; }
        .avatar-circle { 
            width: 80px; height: 80px; background: #8A2BE2; color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; font-weight: 800; margin: 0 auto 1rem; 
        }

        .info-card { background: white; border-radius: 30px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
        .info-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid #f0f0f0; }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #777; font-size: 0.85rem; font-weight: 600; }
        .info-value { font-weight: 700; font-size: 0.9rem; color: #1a1a1a; }

        .tier-tag { background: #8A2BE2; color: white; padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; }

        .btn-logout-alt {
            width: 100%; padding: 1.1rem; border-radius: 20px; border: 2px solid #ff6b6b;
            color: #ff6b6b; font-weight: 700; background: transparent; cursor: pointer; margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay"></div>
    <header class="navbar">
        <a class="logo" href="dashboard.html">Pro<span>Signals</span></a>
        <div class="menu-toggle" id="open-menu"><i class="fas fa-bars"></i></div>
    </header>

    <div class="side-menu" id="side-menu">
        <i class="fas fa-times close-menu" id="close-menu"></i>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a></li>
            <li><a href="deposit.html"><i class="fas fa-wallet"></i> Deposit</a></li>
            <li><a href="withdraw.html"><i class="fas fa-money-bill-transfer"></i> Withdraw</a></li>
            <li><a href="transactions.html"><i class="fas fa-history"></i> Transactions</a></li>
            <li><a href="mailto:support@prosignals.com"><i class="fas fa-envelope"></i> Email Us</a></li>
            <li><a href="#" id="logout-btn" style="color:#ff6b6b;"><i class="fas fa-sign-out-alt"></i> Log Out</a></li>
        </ul>
    </div>

    <main class="page-content">
        <div class="profile-header">
            <div class="avatar-circle" id="user-initial">U</div>
            <h2 id="display-name">Loading...</h2>
            <p style="font-size: 0.8rem; color: #888;" id="display-email">user@example.com</p>
        </div>

        <div class="info-card">
            <div class="info-item">
                <span class="info-label">Account Tier</span>
                <span class="tier-tag" id="profile-tier">Basic</span>
            </div>
            <div class="info-item">
                <span class="info-label">Total Balance</span>
                <span class="info-value" id="profile-balance">$0.00</span>
            </div>
            <div class="info-item">
                <span class="info-label">Member Since</span>
                <span class="info-value" id="profile-date">...</span>
            </div>
        </div>

        <button class="btn-logout-alt" id="logout-btn-2">Log Out</button>
    </main>

    <script>
        const _supabase = supabase.createClient('https://iuuokazjfwlziilwwynr.supabase.co', 'sb_publishable_OVw_Wt2N7kMbX05WHpzRpg_fdLqjCFK');

        // MENU LOGIC
        const toggleMenu = (show) => {
            document.getElementById('side-menu').classList.toggle('active', show);
            document.getElementById('overlay').classList.toggle('active', show);
        };
        document.getElementById('open-menu').onclick = () => toggleMenu(true);
        document.getElementById('close-menu').onclick = () => toggleMenu(false);
        document.getElementById('overlay').onclick = () => toggleMenu(false);

        async function loadProfileData() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            // Initial UI from Auth
            const fullName = user.user_metadata?.full_name || "User";
            document.getElementById('display-name').innerText = fullName;
            document.getElementById('display-email').innerText = user.email;
            document.getElementById('user-initial').innerText = fullName.charAt(0).toUpperCase();
            
            const joinDate = new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
            document.getElementById('profile-date').innerText = joinDate;

            // Fetch Live Data
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                document.getElementById('profile-balance').innerText = `$${profile.balance?.toLocaleString() || '0.00'}`;
                document.getElementById('profile-tier').innerText = profile.account_tier || 'Basic';
            }
        }

        const handleLogout = async (e) => {
            if(e) e.preventDefault();
            await _supabase.auth.signOut();
            window.location.href = "index.html";
        };

        document.getElementById('logout-btn').onclick = handleLogout;
        document.getElementById('logout-btn-2').onclick = handleLogout;

        loadProfileData();
    </script>
</body>
</html>
