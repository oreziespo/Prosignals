<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSignals - Withdraw Crypto</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #F2F2F2; color: #333; overflow-x: hidden; }

        /* ── THE NAVBAR ── */
        .navbar { 
            width: 100%; 
            background: aquamarine; 
            padding: 1.2rem 0; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1000; 
            height: 75px; 
            display: flex;
            align-items: center;
        }
        .navbar .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%;
        }
        .logo { font-size: 1.6rem; font-weight: 800; color: #1a1a1a; text-decoration: none; }
        .logo span { color: blueviolet; }
        .menu-toggle { font-size: 1.5rem; cursor: pointer; color: #1a1a1a; }

        /* Side Menu */
        .side-menu { position: fixed; top: 0; right: -100%; height: 100vh; width: 280px; background: white; z-index: 2000; transition: 0.4s ease; padding: 2rem; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .side-menu.active { right: 0; }
        .close-menu { align-self: flex-end; font-size: 1.8rem; cursor: pointer; margin-bottom: 2rem; }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 1.5rem; }
        .nav-links a { text-decoration: none; color: #1a1a1a; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .nav-links a i { color: blueviolet; width: 25px; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1500; display: none; }
        .menu-overlay.active { display: block; }

        /* ── THE FIX: CLEARANCE CONTAINER ── */
        .page-content { 
            padding-top: 120px; 
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .withdraw-card { 
            background: white; 
            width: 92%; 
            max-width: 480px; 
            padding: 2.5rem 2rem; 
            border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            margin-bottom: 3rem;
        }
        
        h1 { font-size: 1.7rem; margin-bottom: 0.5rem; font-weight: 700; text-align: center; color: #1a1a1a; }
        .balance-preview { text-align: center; color: #777; font-size: 0.95rem; margin-bottom: 2.5rem; }
        .balance-preview span { color: blueviolet; font-weight: 800; }

        .label { font-weight: 700; font-size: 0.8rem; color: #444; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-group { margin-bottom: 1.8rem; }
        .input-wrapper { display: flex; align-items: center; background: #F8F9FB; border: 2px solid #F0F0F0; border-radius: 16px; height: 64px; padding: 0 20px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: blueviolet; background: #fff; box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.05); }
        .input-wrapper input, .input-wrapper select { flex: 1; border: none; outline: none; font-size: 1rem; font-weight: 600; background: transparent; color: #333; }
        .input-wrapper i { color: #BBB; margin-right: 15px; font-size: 1.2rem; }

        .btn-submit { width: 100%; padding: 1.3rem; background: blueviolet; color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1.1rem; margin-top: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.98); }
        
        .disclaimer { font-size: 0.75rem; color: #999; text-align: center; margin-top: 2rem; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="menu-overlay" id="overlay"></div>

    <header class="navbar">
        <div class="container">
            <a class="logo" href="dashboard.html">Pro<span>Signals</span></a>
            <div class="menu-toggle" id="open-menu"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <div class="side-menu" id="side-menu">
        <i class="fas fa-times close-menu" id="close-menu"></i>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a></li>
            <li><a href="deposit.html"><i class="fas fa-wallet"></i> Deposit</a></li>
            <li><a href="withdraw.html"><i class="fas fa-money-bill-transfer"></i> Withdraw</a></li>
            <li><a href="transactions.html"><i class="fas fa-history"></i> Transactions</a></li>
            <li><a href="mailto:support@prosignals.com"><i class="fas fa-envelope"></i> Email Us</a></li>
            <li><a href="#" id="logout-btn" style="color:#ff6b6b;"><i class="fas fa-sign-out-alt"></i> Log Out</a></li>
        </ul>
    </div>

    <main class="page-content">
        <div class="withdraw-card">
            <h1>Withdraw</h1>
            <p class="balance-preview">Available: <span id="current-balance">$0.00</span></p>

            <div class="input-group">
                <label class="label">Choose Asset</label>
                <div class="input-wrapper">
                    <i class="fas fa-coins"></i>
                    <select id="withdrawal-asset">
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="USDT">Tether (USDT TRC20)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="BNB">Binance (BNB)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label class="label">Withdrawal Amount</label>
                <div class="input-wrapper">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="withdraw-amount" placeholder="0.00">
                </div>
            </div>

            <div class="input-group">
                <label class="label">Wallet Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-wallet"></i>
                    <input type="text" id="wallet-address" placeholder="Destination Address">
                </div>
            </div>

            <button class="btn-submit" id="submit-request">Request Withdrawal</button>
            <p class="disclaimer">Processing time: 1-24 hours.</p>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://iuuokazjfwlziilwwynr.supabase.co', 'sb_publishable_OVw_Wt2N7kMbX05WHpzRpg_fdLqjCFK');

        // Menu Script
        const toggleMenu = (show) => {
            document.getElementById('side-menu').classList.toggle('active', show);
            document.getElementById('overlay').classList.toggle('active', show);
        };
        document.getElementById('open-menu').onclick = () => toggleMenu(true);
        document.getElementById('close-menu').onclick = () => toggleMenu(false);
        document.getElementById('overlay').onclick = () => toggleMenu(false);

        // Data Fetch
        async function loadProfile() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) window.location.href = 'index.html';

            const { data: profile } = await _supabase.from('profiles').select('balance').eq('id', user.id).single();
            if (profile) document.getElementById('current-balance').innerText = `$${profile.balance.toLocaleString()}`;
        }

        document.getElementById('logout-btn').onclick = async (e) => {
            e.preventDefault();
            await _supabase.auth.signOut();
            window.location.href = "index.html";
        };

        // Action
        document.getElementById('submit-request').onclick = async () => {
            const btn = document.getElementById('submit-request');
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const address = document.getElementById('wallet-address').value;
            const asset = document.getElementById('withdrawal-asset').value;
            
            if (!amount || amount < 20) return alert("Minimum withdrawal is $20");
            if (!address) return alert("Wallet address is required");

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                const { error } = await _supabase.from('transactions').insert([{
                    user_id: user.id,
                    amount: amount,
                    asset: asset,
                    type: 'withdrawal',
                    status: 'pending',
                    details: JSON.stringify({ address: address })
                }]);

                if (error) throw error;
                alert("Request Sent!");
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "Request Withdrawal";
            }
        };

        loadProfile();
    </script>
</body>
</html>
